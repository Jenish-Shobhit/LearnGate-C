name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.x"
      - uses: pnpm/action-setup@v3
        with:
          version: "9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: uv sync --project apps/api --extra dev
      - run: pnpm install --frozen-lockfile
      - run: cd apps/api && ruff check .
      - run: cd apps/api && mypy src/
        env:
          DATABASE_URL: postgresql://learngate:learngate@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
      - run: pnpm --filter @learngate/web eslint .
      - run: pnpm --filter @learngate/web tsc --noEmit

  unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.x"
      - uses: pnpm/action-setup@v3
        with:
          version: "9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: uv sync --project apps/api --extra dev
      - run: pnpm install --frozen-lockfile
      - name: pytest collect-only
        run: cd apps/api && pytest --co -q
        env:
          DATABASE_URL: postgresql://learngate:learngate@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
      - name: vitest
        run: pnpm --filter @learngate/web vitest run --reporter=verbose

  build:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: "9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @learngate/web build
